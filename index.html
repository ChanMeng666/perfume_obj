<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfume 3D Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }
  #loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a2e; color: #eee;
    font-family: system-ui, sans-serif; font-size: 1.2rem;
    z-index: 10; transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="loading">Loading model…</div>
<script type="module">
import * as THREE from 'three';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
backLight.position.set(-5, -2, -5);
scene.add(backLight);

const colors = {
  'a-chan': 0xff6b8a,
  'kashiyuka': 0x6bc5ff,
  'nocchi': 0x8aff6b,
};

new OBJLoader().load(
  'perfume_3.obj',
  (obj) => {
    obj.traverse((child) => {
      if (child.isMesh) {
        const color = colors[child.name] || 0xcccccc;
        child.material = new THREE.MeshPhongMaterial({
          color,
          shininess: 60,
          side: THREE.DoubleSide,
        });
      }
    });

    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3()).length();

    obj.position.sub(center);
    camera.position.set(0, size * 0.3, size * 1.2);
    controls.target.set(0, 0, 0);
    controls.update();

    scene.add(obj);
    document.getElementById('loading').classList.add('hidden');
  },
  (xhr) => {
    if (xhr.total) {
      const pct = Math.round((xhr.loaded / xhr.total) * 100);
      document.getElementById('loading').textContent = `Loading model… ${pct}%`;
    }
  },
  (err) => {
    document.getElementById('loading').textContent = 'Failed to load model.';
    console.error(err);
  }
);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
